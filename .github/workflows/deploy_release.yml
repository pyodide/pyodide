name: deploy-release

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-pyodide-py-pypi:
    name: Build pyodide-py Python distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install build

      - name: Build sdist and wheel
        run: |
          cd src/py/
          python -m build .

      - name: Upload the distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pyodide-py-distributions
          path: src/py/dist/
          if-no-files-found: error

  publish-pyodide-py-pypi:
    name: Publish pyodide-py to PyPI
    needs: build-pyodide-py-pypi
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: PyPi
      url: https://pypi.org/p/pyodide-py
      deployment: false
    permissions:
      id-token: write # for OIDC trusted publishing

    steps:
      - name: Download pyodide-py Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pyodide-py-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
