name: main

on:
  push:
  pull_request:

concurrency:
  group: main-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

permissions: {}

jobs:
  get_python_version:
    name: Get Python version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      PYVERSION: ${{ steps.get_python_version.outputs.PYVERSION }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Read the Python version from Makefile.envs
        id: get_python_version
        run: |
          echo "PYVERSION=$(git grep 'export PYVERSION ?=' Makefile.envs | cut -d' ' -f4)"  >> "$GITHUB_OUTPUT"

  check-docs:
    name: Check documentation
    runs-on: ubuntu-latest
    needs: get_python_version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ needs.get_python_version.outputs.PYVERSION }}
      - name: Install Python requirements
        shell: bash -l {0}
        run: |
          python3 -m pip install -r docs/requirements-doc.txt
      - name: Install node requirements
        shell: bash -l {0}
        run: |
          cd src/js && npm i
      - name: Build docs
        shell: bash -l {0}
        run: |
          make -C docs/ html
      - name: Check docs
        shell: bash -l {0}
        run: |
          ./tools/check_documented_functions.py --check

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: get_python_version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ needs.get_python_version.outputs.PYVERSION }}
      - name: Install requirements
        shell: bash -l {0}
        run: |
          mkdir test-results
          make pyodide_build
          python3 -m pip install -r requirements.txt -r requirements-deploy.txt
      - name: Check test collection
        shell: bash -l {0}
        run: |
          PYODIDE_ROOT=. pytest --collect-only
      - name: Run tests
        shell: bash -l {0}
        run: |
          PYODIDE_ROOT=. pytest \
              --junitxml=test-results/junit.xml \
              --verbose \
              --runtime=host \
              --cov=pyodide \
              src tools/
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: false

  build-core:
    name: Build core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pyodide_packages: "tag:core,tag:pyodide.test,numpy${{ needs.test-scipy-trigger.outputs.test-scipy == 'true' && ',scipy' || '' }}"
          - os: macos-14
            pyodide_packages: "tag:core,tag:pyodide.test,numpy"
    runs-on: ${{ matrix.os }}
    needs: [test-scipy-trigger]
    permissions:
      contents: read
    env:
      EMSDK_NUM_CORES: 3
      EMCC_CORES: 3
      PYODIDE_JOBS: 3
      CCACHE_DIR: /tmp/ccache

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false
      - name: Cache ccache output
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            /tmp/ccache
          key: ${{ hashFiles('Makefile.envs') }}-${{ runner.os }}-v20211025-

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.21"

      - uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          activate-environment: pyodide-env
          environment-file: environment.yml
          channels: conda-forge

      - name: Check Versions
        shell: bash -l {0}
        run: |
          python --version
          node --version
          npm --version
          which python
          which node
          which npm
          which go

      - name: Install dependencies (ubuntu)
        shell: bash -l {0}
        if: ${{ contains(runner.os, 'ubuntu') }}
        run: |
          sudo apt install -y build-essential git xxd

      - name: Install dependencies (macos)
        shell: bash -l {0}
        if: ${{ contains(runner.os, 'macos') }}
        run: |
          brew install coreutils

      - name: Install dependencies (Python)
        shell: bash -l {0}
        run: |
          python -m pip install -r requirements.txt

      - name: Build emsdk
        shell: bash -l {0}
        run: |
          which ccache

          ccache -z
          make -C emsdk
          ccache -s

      - name: Build Cpython
        shell: bash -l {0}
        run: |
          # This is necessary to use the ccache from emsdk
          source pyodide_env.sh

          which ccache

          ccache -z
          make -C cpython
          ccache -s

      - name: build Pyodide with packages ${{ matrix.pyodide_packages }}
        shell: bash -l {0}
        env:
          PYODIDE_PACKAGES: ${{ matrix.pyodide_packages }}
          PYODIDE_JOBS: ${{ env.PYODIDE_JOBS }}
        run: |
          # This is necessary to use the ccache from emsdk
          source pyodide_env.sh
          ccache -z
          make -j$PYODIDE_JOBS
          ccache -s

      - name: Build windows python.exe
        shell: bash -l {0}
        run: |
          make dist/python.exe

      - name: check-size
        shell: bash -l {0}
        run: |
          ls -lh dist/

          pip install brotli
          ./tools/check_compressed_size.py dist/pyodide.asm.* dist/python_stdlib*

      - name: Store artifacts build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-build-${{ runner.os }}
          path: ./dist/
          retention-days: 60

      - name: Store sysconfig
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: core-sysconfig-${{ runner.os }}
          path: ./cpython/installs/
          retention-days: 60

  test-core:
    name: Test core (${{ matrix.browser }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      DISPLAY: :99

    needs: [build-core]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
        runner: [selenium]
        browser: [safari]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: core-build-${{ runner.os }}
          path: ./dist/

      - uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
        with:
          activate-environment: pyodide-env
          python-version: "3.14"
          channels: conda-forge
          # pin, as a workaround to avoid macOS conda activation bug in 26.3.2-2
          # see https://github.com/conda-incubator/setup-miniconda/issues/501
          miniconda-version: "py312_26.1.1-1"

      - name: install test requirements
        shell: bash -l {0}
        run: |
          pip install -r requirements.txt -r requirements-deploy.txt
          make pyodide_build

      - uses: pyodide/pyodide-actions/install-browser@012fa537869d343726d01863a34b773fc4d96a14 # v2
        with:
          runner: ${{ matrix.runner }}
          browser: ${{ matrix.browser }}

      - name: Safari pre-test cleanup
        if: matrix.browser == 'safari'
        shell: bash -l {0}
        run: |
          # Kill any stale Safari/safaridriver processes
          pkill -9 Safari 2>/dev/null || true
          pkill -9 safaridriver 2>/dev/null || true
          sleep 3

          # Verify safaridriver can start and respond
          safaridriver --port 14444 &
          DRIVER_PID=$!

          for i in $(seq 1 20); do
            if curl -sf http://localhost:14444/status > /dev/null 2>&1; then
              echo "✓ SafariDriver responding"
              kill $DRIVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "✗ SafariDriver failed to respond"
          kill $DRIVER_PID 2>/dev/null || true
          exit 1

      - name: run core tests
        env:
          BROWSER: ${{ matrix.browser }}
          RUNNER: ${{ matrix.runner }}
        shell: bash -l {0}
        run: |
          ls -lh
          ls -lh dist/
          tools/pytest_wrapper.py src \
            -v \
            -k "not webworker" \
            --runtime="${BROWSER}-no-host" \
            --runner "${RUNNER}" \
            --durations 50 \
            --junitxml=test-results/core_test.xml

      - name: run package tests
        env:
          BROWSER: ${{ matrix.browser }}
          RUNNER: ${{ matrix.runner }}
        shell: bash -l {0}
        run: |
          ls -lh
          ls -lh dist/
          tools/pytest_wrapper.py packages/*/test* \
            -v \
            -k "numpy and not joblib" \
            --runtime="${BROWSER}-no-host" \
            --runner "${RUNNER}" \
            --durations 50 \
            --junitxml=test-results/packages_test.xml

      - name: Test Summary
        uses: test-summary/action@31493c76ec9e7aa675f1585d3ed6f1da69269a86 # v2.4
        with:
          paths: "test-results/*.xml"
        if: always()

  test-cmdline-runner:
    name: Test command-line runner (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    needs: [build-core, get_python_version]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ needs.get_python_version.outputs.PYVERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # To test Windows cmdline runner we always use the Linux build artifact
          name: core-build-Linux
          path: ./dist/

      - name: Download sysconfig artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # To test Windows cmdline runner we always use the Linux artifact
          name: core-sysconfig-Linux
          path: ./cpython/installs/

      - name: Run cmdline-runner tests
        shell: bash -l {0}
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            ./tools/cmdline_runner_test/run.bat
          else
            ./tools/cmdline_runner_test/run
          fi

  test-db-integration:
    name: Test DB integrations
    runs-on: ubuntu-latest
    needs: [build-core, get_python_version]
    services:
      mysql:
        image: mysql:8.0.45@sha256:4af1f8815716546f5b12410f7621f37f93db8dd11a184706ef59111930b8c2ff
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_ROOT_HOST: "%"
        options: >-
          --health-cmd="mysqladmin ping -prootpw --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      postgres:
        image: postgres:16@sha256:71e27bf60b70bded003791b5573f8b808365613f341df20ffcf0c1ed7bc13ddf
        ports:
          - 5432:5432
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_HOST_AUTH_METHOD: md5
          POSTGRES_INITDB_ARGS: "--auth-host=md5"
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7@sha256:5a77f0f4698389019f828f6387049ce1d5adbea204e56422aa7720dab7034287
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ needs.get_python_version.outputs.PYVERSION }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: core-build-Linux
          path: ./dist/

      - name: Install test requirements
        shell: bash -l {0}
        run: |
          set -e -x
          mkdir -p test-results
          python -m pip install -r requirements.txt
          python -m pip install pymysql cryptography pg8000 redis
          make npm-link

      - name: Run database integration tests (node)
        shell: bash -l {0}
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: "3306"
          MYSQL_ROOT_USER: root
          MYSQL_ROOT_PASSWORD: rootpw
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
        run: |
          source pyodide_env.sh
          tools/pytest_wrapper.py \
            --verbose \
            --runtime=node-no-host \
            -m db \
            src/tests/test_database_driver.py

  test-scipy-trigger:
    name: test-scipy-trigger
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test-scipy: ${{ steps.check-build-trigger.outputs.trigger }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Check build trigger
        id: check-build-trigger
        shell: bash
        env:
          HAS_SCIPY_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'scipy') }}
        run: |
          set -e -x

          COMMIT_MSG=$(git log --no-merges -1 --oneline)

          # The scipy tests will be triggered on push or on pull_request when the commit
          # message contains "[scipy]" or when the PR has `scipy` label
          if [[ "$GITHUB_EVENT_NAME" == push ||
                "$COMMIT_MSG" =~ \[scipy\] ||
                "$HAS_SCIPY_LABEL" == "true" ]]; then
              echo "trigger=true" >> "$GITHUB_OUTPUT"
          fi

  test-scipy:
    name: Test SciPy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test-scipy-trigger, build-core]
    if: needs.test-scipy-trigger.outputs.test-scipy
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: core-build-${{ runner.os }}
          path: ./dist/

      - name: run scipy tests inside node
        shell: bash -l {0}
        run: |
          npm install pyodide
          cp -f dist/* node_modules/pyodide

          # This uses conftest.py on the current working directory to
          # skip/xfail tests in scipy
          cd packages/scipy
          # XXX for some unknown reason adding a conftest.py in the repo throws off the
          # other tests trying to import from conftest they find the scipy one ...
          mv scipy-conftest.py conftest.py

          node scipy-pytest.js --pyargs scipy -m 'not slow' -ra -v

  test-bun:
    name: Test Bun (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    needs: [build-core]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: core-build-${{ runner.os }}
          path: ./dist/

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: install test requirements
        working-directory: src/test-bun
        run: |
          bun --version
          bun install

      - name: run bun tests
        working-directory: src/test-bun
        run: bun smoke-test.js

  test-deno:
    name: Test Deno (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    needs: [build-core]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: core-build-${{ runner.os }}
          path: ./dist/

      - name: install test requirements
        shell: bash -l {0}
        run: |
          curl -fsSL https://deno.land/install.sh | sudo DENO_INSTALL=/usr/local sh -s v1.33.1
          deno --version

      - name: run deno tests
        shell: bash -l {0}
        run: cd src/test-deno && deno task test
