name: Deploy to GitHub Pages

on:
  push:
    # The update_cross_build_releases.yml workflow updates the cross-build environments metadata
    # file and pushes it to the main branch. This workflow gets triggered by that push.
    branches:
      - main
    paths:
      # This workflow only runs if these specific files change
      - "metadata/**"
  workflow_dispatch:
  schedule:
    # Run every day at 03:00 UTC
    - cron: "0 3 * * *"

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy cross-build environments metadata to GitHub Pages
    permissions:
      contents: read
      pages: write # for deploying to GitHub Pages
      id-token: write # for OIDC trusted publishing to GitHub Pages
    environment:
      name: github-pages
      # This is cosmetically used in the deployment logs as the clickable link; it won't affect
      # our existing deployments since the pages are published based on what we have below in _site
      url: ${{ steps.deployment.outputs.page_url }}/api/v2/pyodide-cross-build-environments.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

        # v2: same as v1, but adds published_at field with ISO 8601 UTC timestamp to each release entry.
        #     It is used by pyodide-build >= 0.34.5, which switches the default metadata URL to /api/v2/.
        # v1: schema without published_at, served at the original URL path for backward compatibility
        #     with pyodide-build < 0.34.5. This is frozen and will no longer be updated by the script.
        # We will continue to host both for backward compatibility with earlier pyodide-build versions
      - name: Prepare artifacts
        run: |
          mkdir -p ./_site/api/v2
          cp metadata/pyodide-cross-build-environments-v2.json ./_site/api/v2/pyodide-cross-build-environments.json
          cp metadata/pyodide-cross-build-environments-v1.json ./_site/api/pyodide-cross-build-environments.json
          cp metadata/pyodide-cross-build-environments-debug-v2.json ./_site/api/v2/debug.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
