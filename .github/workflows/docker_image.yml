name: pyodide-env-docker

on:
  workflow_dispatch:
    inputs:
      chrome_version:
        description: "Version of the chrome browser (e.g. 109, 108, latest)."
        required: false
        default: "109"
      firefox_version:
        description: "Version of the firefox browser (e.g. 109, 108, latest)."
        required: false
        default: "109"
      tag:
        description: "Tag of the docker image to build (If not set, <release-date>-chrome[version]-firefox[version] will be used)"
        required: false
        default: ""

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: pyodide/pyodide-env

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_docker:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest
    environment: Docker
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log into Docker Hub registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
      - name: Set tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_CHROME_VERSION: ${{ github.event.inputs.chrome_version }}
          INPUT_FIREFOX_VERSION: ${{ github.event.inputs.firefox_version }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            DATE=$(date +'%Y%m%d')
            TAG="$DATE-chrome${INPUT_CHROME_VERSION}-firefox${INPUT_FIREFOX_VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image to Docker Hub
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CHROME_VERSION=${{ github.event.inputs.chrome_version }}
            FIREFOX_VERSION=${{ github.event.inputs.firefox_version }}
      - name: Image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "$DIGEST"

  build_ghcr:
    name: Build Docker image and push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # for pushing to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Log into registry ${{ env.GHCR_REGISTRY }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Set tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_CHROME_VERSION: ${{ github.event.inputs.chrome_version }}
          INPUT_FIREFOX_VERSION: ${{ github.event.inputs.firefox_version }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            DATE=$(date +'%Y%m%d')
            TAG="$DATE-chrome${INPUT_CHROME_VERSION}-firefox${INPUT_FIREFOX_VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image to ${{ env.GHCR_REGISTRY }}
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: ./Dockerfile
          push: true
          tags: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CHROME_VERSION=${{ github.event.inputs.chrome_version }}
            FIREFOX_VERSION=${{ github.event.inputs.firefox_version }}
      - name: Image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "$DIGEST"
